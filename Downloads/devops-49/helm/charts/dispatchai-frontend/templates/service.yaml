apiVersion: v1
kind: Service
metadata:
  name: {{ include "dispatchai-frontend.fullname" . }}-service
  labels:
    app: {{ include "dispatchai-frontend.fullname" . }}
    env: {{ .Values.environment }}
spec:
  type: ClusterIP
  selector:
    app: {{ include "dispatchai-frontend.fullname" . }}
  ports:
    - name: app-port
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}

